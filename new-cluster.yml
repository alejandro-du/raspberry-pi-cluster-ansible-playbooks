- name: Configuring new cluster
  hosts: "{{ lookup('env', 'TARGET_GROUP_NAME') | default('rpies', true) }}"
  tasks:
    - name: Update package lists
      become: yes
      apt:
        update_cache: yes

    - name: Upgrade packages
      become: yes
      apt:
        upgrade: yes
        update_cache: yes
        cache_valid_time: 86400

    - name: Expand filesystem
      become: yes
      shell: raspi-config --expand-rootfs

    - name: Set heartbeat LED trigger
      become: yes
      lineinfile:
        path: /boot/config.txt
        line: "dtparam=act_led_trigger=heartbeat"
        state: present

    - name: Reboot
      become: true
      reboot:
        reboot_timeout: 200
